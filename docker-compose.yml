services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Override the default localhost URL to use the docker network alias
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=metadata_db
      - PYTHONPATH=/app
    depends_on:
      - mongodb
    # Optional: Mount the app directory for live-reloading during development
    volumes:
      - ./app:/app/app 
      - ./tests:/app/tests

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      # Persist database data across container restarts
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data: